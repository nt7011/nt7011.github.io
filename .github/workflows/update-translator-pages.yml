name: Update Translator Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - translator_release_updated
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Pages repo
        uses: actions/checkout@v6

      - name: Check out cheat installer repo
        uses: actions/checkout@v6
        with:
          repository: nt7011/RPG-Maker-MV-MZ-Cheat-UI-Plugin-Web-Installer
          path: _cheats_upstream

      - name: Copy versioned translator payloads into the site
        run: |
          set -euo pipefail

          # Payloads are generated by this workflow, not committed source. Clear
          # both known payload layouts so switching a version between legacy and
          # 4.0-style output never leaves stale files in the Pages artifact.
          rm -rf live-translator-installer
          rm -f version.json
          if [ -d translator ]; then
            find translator \( -path '*/live-translator-installer' -o -path '*/live-translator' \) -type d -prune -exec rm -rf {} +
            find translator -name 'live-translator-files.json' -type f -delete
          fi
          mkdir -p info

          # available-versions.json is the source of truth for what Pages should
          # publish. Normalize accepted fields, reject unsafe path segments, and
          # deduplicate versions before any checkout happens.
          node <<'NODE' > _available-translator-versions.json
          const fs = require("fs");
          const manifest = JSON.parse(fs.readFileSync("available-versions.json", "utf8"));
          const pathSafeVersion = /^[A-Za-z0-9][A-Za-z0-9._-]*$/;

          function readField(names) {
            for (const name of names) {
              if (Object.hasOwn(manifest, name)) {
                return manifest[name];
              }
            }
            return undefined;
          }

          function normalizeVersion(value) {
            return typeof value === "string" ? value.trim() : "";
          }

          function normalizeVersionList(value) {
            const values = Array.isArray(value) ? value : typeof value === "string" ? [value] : [];
            return values.map(normalizeVersion).filter(Boolean);
          }

          function addVersion(version, source) {
            if (!pathSafeVersion.test(version)) {
              throw new Error(`${source} contains an unsafe version path: ${version}`);
            }
            if (!versions.includes(version)) {
              versions.push(version);
            }
          }

          const recommended = normalizeVersion(readField(["recommended", "Recommended"]));
          if (!recommended) {
            throw new Error("available-versions.json must define one recommended version.");
          }
          const recommendedBeta = normalizeVersion(manifest["recommended-beta"]);
          if (!recommendedBeta) {
            throw new Error("available-versions.json must define one recommended-beta version.");
          }

          const versions = [];
          addVersion(recommended, "recommended");
          addVersion(recommendedBeta, "recommended-beta");
          for (const version of normalizeVersionList(readField(["stable", "Stable"]))) {
            addVersion(version, "stable");
          }
          for (const version of normalizeVersionList(readField(["prerelease", "Prerelease", "preRelease", "PreRelease"]))) {
            addVersion(version, "prerelease");
          }

          process.stdout.write(JSON.stringify({ recommended, recommendedBeta, versions }, null, 2));
          NODE

          recommended="$(node -e "const data=require('./_available-translator-versions.json'); process.stdout.write(data.recommended);")"
          mkdir -p _translator_upstream
          while IFS= read -r version; do
            release_branch="release"
            tag="dist-$version"
            source_dir="_translator_upstream/$version"
            target="./translator/$version"

            # 3.2.10 is the only release with the old public payload shape:
            # live-translator-installer/ includes install.files and a root
            # loader plugin entry. All 4.0+ releases publish the runtime as
            # live-translator/, matching the local project directory.
            payload_dir="live-translator"
            file_index=""
            if [ "$version" = "3.2.10" ]; then
              payload_dir="live-translator-installer"
            else
              # Static GitHub Pages cannot enumerate directories at install
              # time. The 4.0 browser installer reads this generated sidecar to
              # know every file that must be copied out of live-translator/.
              file_index="$target/live-translator-files.json"
            fi

            echo "Publishing $version from nt7011/RPG-Maker-Live-Translator:$tag"
            rm -rf "$source_dir"
            git clone --depth 1 --branch "$release_branch" --no-tags https://github.com/nt7011/RPG-Maker-Live-Translator.git "$source_dir"
            git -C "$source_dir" fetch --depth 1 origin "refs/tags/$tag:refs/tags/$tag"
            git -C "$source_dir" checkout --detach "$tag"

            if [ ! -d "$source_dir/$payload_dir" ]; then
              echo "::error::Missing $payload_dir in $tag."
              exit 1
            fi

            if [ ! -f "$source_dir/$payload_dir/version.json" ]; then
              if [ -f "$source_dir/version.json" ]; then
                cp "$source_dir/version.json" "$source_dir/$payload_dir/version.json"
              else
                echo "::warning::Missing version.json in $tag; writing the available-versions entry."
                printf '{\n  "version": "%s"\n}\n' "$version" > "$source_dir/$payload_dir/version.json"
              fi
            fi

            # 4.0-style payloads must be self-consistent. This catches exporting
            # a local-development payload or tagging the wrong tree before users
            # can install it from the beta route.
            if [ "$payload_dir" = "live-translator" ]; then
              payload_version="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(data.version || '').trim());" "$source_dir/$payload_dir/version.json")"
              if [ "$payload_version" != "$version" ]; then
                echo "::error::Payload version $payload_version in $tag does not match available-versions entry $version."
                exit 1
              fi
            fi

            mkdir -p "$target"
            rm -rf "$target/live-translator-installer"
            rm -rf "$target/live-translator"
            rm -f "$target/live-translator-files.json"
            cp -R "$source_dir/$payload_dir" "$target/$payload_dir"

            if [ -n "$file_index" ]; then
              # Keep the sidecar format intentionally tiny. The installer only
              # needs paths; each file is fetched from live-translator/ with
              # cache: no-store when the user installs.
              PAYLOAD_ROOT="$target/$payload_dir" PAYLOAD_INDEX="$file_index" node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const root = process.env.PAYLOAD_ROOT;
          const output = process.env.PAYLOAD_INDEX;
          const files = [];

          function walk(directory) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const fullPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
              } else if (entry.isFile()) {
                files.push(path.relative(root, fullPath).split(path.sep).join("/"));
              }
            }
          }

          walk(root);
          files.sort();
          fs.writeFileSync(output, JSON.stringify({ files }, null, 2) + "\n");
          NODE
            fi

          done < <(node -e "const data=require('./_available-translator-versions.json'); for (const version of data.versions) console.log(version);")

          node <<'NODE'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("_available-translator-versions.json", "utf8"));

          // /translator/ is a static alias for the recommended stable version.
          // Rewrite asset links because the HTML is copied up one directory
          // without an HTTP redirect.
          const recommendedPage = `translator/${data.recommended}/index.html`;
          if (!fs.existsSync(recommendedPage)) {
            throw new Error(`Recommended version page ${recommendedPage} is missing.`);
          }

          const latestTranslatorPage = fs.readFileSync(recommendedPage, "utf8")
            .replaceAll('href="./styles.css"', `href="./${data.recommended}/styles.css"`)
            .replaceAll('src="./app.mjs"', `src="./${data.recommended}/app.mjs"`)
            .replaceAll('href="../../cheats/"', 'href="../cheats/"')
            .replaceAll('href="../../"', 'href="../"');
          fs.writeFileSync("translator/index.html", latestTranslatorPage);
          fs.writeFileSync("info/translator-version.json", JSON.stringify({
            recommended: data.recommended,
            "recommended-beta": data.recommendedBeta,
          }, null, 2) + "\n");
          NODE
          rm -rf _translator_upstream _available-translator-versions.json

      - name: Copy cheat installer into the /cheats subpage
        run: |
          rm -rf cheats
          cp -R _cheats_upstream ./cheats
          rm -rf cheats/.git
          rm -rf _cheats_upstream

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
