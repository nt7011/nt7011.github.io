<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://rmlt.pages.dev/translator/4.0.0b5/">
    <meta http-equiv="refresh" content="0; url=https://rmlt.pages.dev/translator/4.0.0b5/">
    <title>Redirecting...</title>
    <script>
      (function () {
        var target = "https://rmlt.pages.dev" + window.location.pathname + window.location.search + window.location.hash;
        var link = document.getElementById("redirect-link");
        if (link) {
          link.href = target;
          link.textContent = target;
        }
        window.location.replace(target);
      }());
    </script>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font: 16px/1.5 system-ui, sans-serif; color: #172033; background: #f8fafc; }
      main { width: min(560px, calc(100vw - 32px)); }
      a { color: #2563eb; overflow-wrap: anywhere; }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting...</h1>
      <p>This page has moved to <a id="redirect-link" href="https://rmlt.pages.dev/translator/4.0.0b5/">https://rmlt.pages.dev/translator/4.0.0b5/</a>.</p>
    </main>
  </body>
</html>
